<!DOCTYPE html>
<html lang="en">
<head>
  <title>Safepath - Women Safety App</title>

  <style>
    body{
      font-family: Arial, Helvetica, sans-serif;
      text-align:center;
      background: rgb(240, 241, 241);
    }

    .container{
      background:skyblue;
      width:350px;
      margin:auto;
      padding:20px;
      border-radius:10px;
      box-shadow:0px 0px 10px rgb(1, 1, 27);
      margin-top:50px;
    }

    h1{
      color:red;
    }

    input{
      padding: 10px;
      width: 80%;
      margin: 10px;
    }

    button{
      padding: 12px;
      width: 200px;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    .sos{
      background: red;
      color: white;
      margin: 10px;
    }
    

    .location{
      background: green;
      color: white;
    }

    .contacts{
      margin-top: 20px;
      text-align: left;
    }
  </style>

</head>
<body>

  <div class="container">

    <h1>SafePath</h1>
    <p>Women Safety Alert System</p>

    <input type="text" id="name"
    placeholder="Enter your name">

    <br>
    
    <button class="sos"
    onclick="sendAlert()">SOS Emergency</button>

    <br>

    <button class="location"
    onclick="openLocation()">Share Location</button>

    <div class="contacts">
      <h3>Emergency Contacts</h3>
      <p>🚓Police: 100</p>
      <p>🚑Ambulance: 102</p>
      <p>👩Women Helpline: 1091</p>
    </div>

    <p id="message"></p>

  </div>
  <script>
    function sendAlert(){
      var
      name=document.getElementById("name").value;

      if (name==""){
        alert("Please enter your name first!");
      }
      else{
        document.getElementById("message").innerHTML=
        "Emergency alert sent for "+name+"!";
      }

      function openLocation(){
        window.open("https://www.google.com/maps");
      }
    }
  </script>
</body>
</html>
